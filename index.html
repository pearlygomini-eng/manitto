<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마니또 뽑기</title>

<style>
body{
font-family:Arial, sans-serif;
background:#f6f7fb;
margin:0;
padding:0;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 25px rgba(0,0,0,0.08);
margin-bottom:20px;
}

input{
padding:10px;
border-radius:8px;
border:1px solid #ddd;
width:100%;
margin-bottom:10px;
}

button{
padding:10px 16px;
border:none;
background:#ff5b7f;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:6px;
}

button:hover{opacity:.9}

.participant{
font-size:14px;
padding:6px 0;
border-bottom:1px solid #eee;
}

.resultCard{
text-align:center;
font-size:24px;
font-weight:bold;
margin-top:10px;
}

.hint{
margin-top:10px;
background:#fff4e8;
padding:10px;
border-radius:8px;
}

.link{
font-size:12px;
word-break:break-all;
margin-top:6px;
color:#444;
}
</style>
</head>

<body>

<div class="container">

<h1>🎁 마니또 뽑기</h1>

<div class="card">

<h3>참가자 추가</h3>

<input id="nameInput" placeholder="이름">
<input id="teamInput" placeholder="팀 (선택)">
<input id="tasteInput" placeholder="취향 / 선물 힌트 (선택)">

<button onclick="addParticipant()">추가</button>

<div id="participantList"></div>

</div>

<div class="card">

<h3>마니또 매칭</h3>

<button onclick="doMatch()">✨ 마니또 매칭 시작</button>

<div id="resultLinks"></div>

</div>

</div>

<script>

let participants=[];
let matches=[];

function randPw(){

const animals=["호랑이","고래","수달","돌고래","여우","곰","고양이"];
const colors=["초록","주황","파랑","검정","보라","하늘"];

return colors[Math.floor(Math.random()*colors.length)]
+animals[Math.floor(Math.random()*animals.length)];

}


function addParticipant(){

const name=document.getElementById("nameInput").value.trim();
const team=document.getElementById("teamInput").value.trim();
const taste=document.getElementById("tasteInput").value.trim();

if(!name)return;

participants.push({
name,
team,
taste
});

document.getElementById("nameInput").value="";
document.getElementById("teamInput").value="";
document.getElementById("tasteInput").value="";

renderParticipants();

}


function renderParticipants(){

const list=document.getElementById("participantList");

list.innerHTML="";

participants.forEach(p=>{

const div=document.createElement("div");
div.className="participant";

div.innerText=p.name+(p.team?(" ("+p.team+")"):"");

list.appendChild(div);

});

}


function shuffle(arr){

for(let i=arr.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[arr[i],arr[j]]=[arr[j],arr[i]];

}

return arr;

}


function doMatch(){

if(participants.length<2){

alert("참가자가 부족합니다");
return;

}

let receivers=[...participants];
shuffle(receivers);

matches=[];

for(let i=0;i<participants.length;i++){

let giver=participants[i];

let receiver=receivers[i];

if(giver.team && receiver.team && giver.team===receiver.team){

shuffle(receivers);
return doMatch();

}

matches.push({

giver,
receiver,
pw:randPw()

});

}

renderLinks();

}


function encodeData(obj){

return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));

}


function renderLinks(){

const box=document.getElementById("resultLinks");

box.innerHTML="<h4>개인 결과 링크</h4>";

matches.forEach(m=>{

const data={
giver:m.giver.name,
receiver:m.receiver.name,
taste:m.receiver.taste,
pw:m.pw
};

const encoded=encodeData(data);

const url=location.origin+location.pathname+"?result="+encoded;

const div=document.createElement("div");

div.innerHTML=`
<div class="participant">
${m.giver.name} 비밀번호: <b>${m.pw}</b>
<div class="link">${url}</div>
</div>
`;

box.appendChild(div);

});

}


function decodeData(str){

return JSON.parse(decodeURIComponent(escape(atob(str))));

}


(function(){

const params=new URLSearchParams(location.search);
const encoded=params.get("result");

if(!encoded)return;

const data=decodeData(encoded);

document.body.innerHTML=`
<div class="container">

<div class="card">

<h2>🎁 마니또 결과 확인</h2>

<p>${data.giver} 님</p>

<input id="pwInput" placeholder="비밀번호 입력">

<button onclick="reveal()">확인</button>

<div id="resultArea"></div>

</div>

</div>
`;

window.reveal=function(){

const pw=document.getElementById("pwInput").value;

if(pw!==data.pw){

document.getElementById("resultArea").innerHTML="비밀번호가 틀렸습니다";
return;

}

document.getElementById("resultArea").innerHTML=`
<div class="resultCard">🎁 ${data.receiver}</div>

${data.taste?`<div class="hint"><b>선물 힌트</b><br>${data.taste}</div>`:""}
`;

};

})();

</script>

</body>
</html>
